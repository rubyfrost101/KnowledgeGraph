services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_NAME: KnowledgeGraph API
      POSTGRES_DSN: postgresql://knowledgegraph:knowledgegraph@postgres:5432/knowledgegraph
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: knowledgegraph
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - neo4j
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: knowledgegraph
      POSTGRES_PASSWORD: knowledgegraph
      POSTGRES_DB: knowledgegraph
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/knowledgegraph
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
